        .container {

            z-index: 10;
        }

        /* Player Wrapper */
        .player-wrapper {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #000;

        .pause-ring-effect .outer-ring { stroke-dasharray: 400; stroke-dashoffset: 400; animation: ringDraw 1.5s forwards ease-out; opacity: 0.8; }
        .pause-ring-effect .inner-ring { stroke-dasharray: 300; stroke-dashoffset: 300; animation: ringDrawInner 1.5s forwards ease-out 0.2s; opacity: 0.6; }

        @keyframes ringDraw { to { stroke-dashoffset: 0; } }

        .dt-indicator {

        const srWarning = document.getElementById('srWarning');
        function detectScreenRecord() {
            const now = performance.now();
            if (now - lastTime > 100 && !video.paused) { 
                frameDrops++;
                if (frameDrops > 20) {
                    srWarning.style.display = 'block';
                    setTimeout(() => { srWarning.style.display = 'none'; frameDrops = 0; }, 3500);
                }
            } else {
                if (frameDrops > 0) frameDrops--;
            }
            lastTime = now;
            requestAnimationFrame(detectScreenRecord);
        }
        detectScreenRecord();

        // 1️⃣ Right Click Block
        document.addEventListener('contextmenu', e => e.preventDefault());


        // --- UI ELEMENTS ---
        const playBtn = document.getElementById('playBtn');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const seekPreviewBar = document.getElementById('seekPreviewBar'); 
        const timeDisplay = document.getElementById('timeDisplay');
        const muteBtn = document.getElementById('muteBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const loading = document.querySelector('.loading');
        const playerWrapper = document.getElementById('playerWrapper');
        const pauseEffect = document.getElementById('pauseEffect');
        const dtLeft = document.getElementById('dtLeft');
        const dtRight = document.getElementById('dtRight');
        
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsMenu = document.getElementById('settingsMenu');
        const downloadBtn = document.getElementById('downloadBtn');
        const speedBtn = document.getElementById('speedBtn');
        
        const downloadModal = document.getElementById('downloadModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const speedModal = document.getElementById('speedModal');
        const closeSpeedModalBtn = document.getElementById('closeSpeedModalBtn');
        const speedOptions = document.querySelectorAll('.speed-option');

        let hideControlsTimeout;
        let lastTapTime = 0; 
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        // Menu & Modals Logic
        settingsBtn.addEventListener('click', (e) => { e.stopPropagation(); settingsMenu.classList.toggle('show'); resetControlsTimeoutOnAction(); });
        downloadBtn.addEventListener('click', (e) => { e.stopPropagation(); settingsMenu.classList.remove('show'); downloadModal.classList.add('show'); resetControlsTimeoutOnAction(); });
        speedBtn.addEventListener('click', (e) => { e.stopPropagation(); settingsMenu.classList.remove('show'); speedModal.classList.add('show'); resetControlsTimeoutOnAction(); });
        closeModalBtn.addEventListener('click', (e) => { e.stopPropagation(); downloadModal.classList.remove('show'); });
        downloadModal.addEventListener('click', (e) => { if (e.target === downloadModal) downloadModal.classList.remove('show'); });
        closeSpeedModalBtn.addEventListener('click', (e) => { e.stopPropagation(); speedModal.classList.remove('show'); });
        speedModal.addEventListener('click', (e) => { if (e.target === speedModal) speedModal.classList.remove('show'); });

        speedOptions.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                video.playbackRate = parseFloat(link.getAttribute('data-speed'));
                speedModal.classList.remove('show');
            });
        });

        // 5️⃣ Blob URL Protection Setup
        async function loadProtectedVideo() {
            loading.classList.add('active');
            try {
                // Fetching the playlist as a blob to hide direct source link from simple inspect
                const response = await fetch(rawVideoSource);
                if(!response.ok) throw new Error("CORS or Fetch Failed");
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                
                if (Hls.isSupported()) {
                    const hls = new Hls({ maxMaxBufferLength: 60 });
                    hls.loadSource(blobUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.ERROR, (event, data) => { if (data.fatal) loadDirectFallback(); });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = blobUrl;
                }
            } catch (err) {
                // Fallback to direct XHR if CORS blocks the blob fetch
                loadDirectFallback();
            }
        }

        function loadDirectFallback() {
            if (Hls.isSupported()) {
                const hls = new Hls({ maxMaxBufferLength: 60 });
                hls.loadSource(rawVideoSource);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = rawVideoSource;
            }
        }

        // Initialize Player
        loadProtectedVideo();

        video.addEventListener('play', () => playerWrapper.classList.add('has-started'));

        function fastSeekOptimized(amount) {
            let newTime = video.currentTime + amount;
            if (newTime < 0) newTime = 0;
            if (newTime > video.duration) newTime = video.duration;
            video.currentTime = newTime;
        }

        function triggerIndicator(element) {
            element.classList.remove('active'); void element.offsetWidth;
            element.classList.add('active'); resetControlsTimeoutOnAction();
        }

        function togglePlay() {
            if (video.paused) {
                video.play().then(() => {
                    playBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"></rect><rect x="14" y="4" width="4" height="16" rx="1"></rect></svg>';
                    pauseEffect.classList.remove('active'); showControls();
                }).catch(()=>{});
            } else {
                video.pause();
                playBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
                pauseEffect.classList.add('active'); showControls();
            }
        }

        function showControls() {
            playerWrapper.classList.add('show-controls'); clearTimeout(hideControlsTimeout);
            if (!video.paused) { hideControlsTimeout = setTimeout(() => { playerWrapper.classList.remove('show-controls'); settingsMenu.classList.remove('show'); }, 5000); }
        }

        function toggleControlsTouch() {
            if (playerWrapper.classList.contains('show-controls')) {
                playerWrapper.classList.remove('show-controls'); settingsMenu.classList.remove('show'); clearTimeout(hideControlsTimeout);
            } else { resetControlsTimeoutOnAction(); }
        }

        if (!isTouchDevice) {
            playerWrapper.addEventListener('mousemove', showControls); playerWrapper.addEventListener('mouseenter', showControls);
        }

        playBtn.addEventListener('click', togglePlay);

        // Timeline Drag Logic
        let isDraggingTimeline = false;
        function getTimelinePos(e) {
            const rect = progressContainer.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
            let pos = (clientX - rect.left) / rect.width; return Math.max(0, Math.min(pos, 1));
        }

        if (!isTouchDevice) {
            progressContainer.addEventListener('mousemove', (e) => {
                if (!isDraggingTimeline) { seekPreviewBar.style.width = (getTimelinePos(e) * 100) + '%'; seekPreviewBar.classList.add('active'); }
            });
            progressContainer.addEventListener('mouseleave', () => { if (!isDraggingTimeline) seekPreviewBar.classList.remove('active'); });
        }

        function startDrag(e) {
            isDraggingTimeline = true; seekPreviewBar.classList.add('active'); updateDrag(e);
            document.addEventListener('mousemove', updateDrag); document.addEventListener('touchmove', updateDrag, { passive: false });
            document.addEventListener('mouseup', endDrag); document.addEventListener('touchend', endDrag);
        }

        function updateDrag(e) {
            if (!isDraggingTimeline) return; if (e.type === 'touchmove') e.preventDefault(); 
            const pos = getTimelinePos(e); seekPreviewBar.style.width = (pos * 100) + '%'; progressBar.style.width = (pos * 100) + '%'; 
            const customTime = pos * video.duration; const durFormatted = formatTime(video.duration || 0); let curFormatted = formatTime(customTime);
            if ((video.duration || 0) >= 3600 && customTime < 3600) {
                curFormatted = `00:${Math.floor((customTime % 3600) / 60).toString().padStart(2, '0')}:${Math.floor(customTime % 60).toString().padStart(2, '0')}`;
            }
            timeDisplay.textContent = `${curFormatted} / ${durFormatted}`;
        }

        function endDrag(e) {
            if (!isDraggingTimeline) return; isDraggingTimeline = false;
            video.currentTime = getTimelinePos(e) * video.duration; seekPreviewBar.classList.remove('active'); 
            document.removeEventListener('mousemove', updateDrag); document.removeEventListener('touchmove', updateDrag);
            document.removeEventListener('mouseup', endDrag); document.removeEventListener('touchend', endDrag);
            resetControlsTimeoutOnAction();
        }

        progressContainer.addEventListener('mousedown', startDrag);
        progressContainer.addEventListener('touchstart', startDrag, { passive: false });

        video.addEventListener('timeupdate', () => {
            if(!video.seeking && !isDraggingTimeline) { 
                progressBar.style.width = ((video.currentTime / video.duration) * 100) + '%'; updateTimeDisplay();
            }
        });

        // Screen Click Logic
        playerWrapper.addEventListener('click', (e) => {
            if(!e.target.closest('.top-right-container')) settingsMenu.classList.remove('show');
            if(e.target.closest('.controls') || e.target.closest('.progress-container') || e.target.closest('.top-right-container') || e.target.closest('.download-modal')) return;

            const currentTime = new Date().getTime(); const tapLength = currentTime - lastTapTime;
            const rect = playerWrapper.getBoundingClientRect(); const clickX = e.clientX - rect.left;
            let region = 'center'; if (clickX < rect.width / 3) region = 'left'; else if (clickX > (rect.width * 2) / 3) region = 'right';

            if (!isTouchDevice) {
                if (tapLength < 300 && tapLength > 0) { toggleFullscreen(); lastTapTime = 0; } else { togglePlay(); lastTapTime = currentTime; }
                return;
            }

            if (tapLength < 300 && tapLength > 0) {
                if (region === 'left') { fastSeekOptimized(-5); triggerIndicator(dtLeft); } 
                else if (region === 'right') { fastSeekOptimized(5); triggerIndicator(dtRight); } 
                else { togglePlay(); }
                lastTapTime = 0; 
            } else {
                if (region === 'center') { togglePlay(); } else { toggleControlsTouch(); }
                lastTapTime = currentTime;
            }
        });

        rewindBtn.addEventListener('click', (e) => { e.stopPropagation(); fastSeekOptimized(-5); triggerIndicator(dtLeft); resetControlsTimeoutOnAction(); });
        forwardBtn.addEventListener('click', (e) => { e.stopPropagation(); fastSeekOptimized(5); triggerIndicator(dtRight); resetControlsTimeoutOnAction(); });

        function toggleFullscreen() {
            if (!document.fullscreenElement) { playerWrapper.requestFullscreen().catch(() => {}); } else { document.exitFullscreen(); }
        }
        fullscreenBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFullscreen(); });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                playerWrapper.classList.add('is-fullscreen');
                if (screen.orientation && screen.orientation.lock) { screen.orientation.lock('landscape').catch(() => {}); }
            } else {
                playerWrapper.classList.remove('is-fullscreen');
                if (screen.orientation && screen.orientation.unlock) { screen.orientation.unlock(); }
            }
        });

        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation(); video.muted = !video.muted;
            if (video.muted) {
                muteBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2V15H6L11 19V5Z"></path><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>`;
            } else {
                muteBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
            }
            resetControlsTimeoutOnAction();
        });

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return '00:00';
            const h = Math.floor(seconds / 3600); const m = Math.floor((seconds % 3600) / 60); const s = Math.floor(seconds % 60);
            if (h > 0) return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateTimeDisplay() {
            const dur = video.duration || 0; const cur = video.currentTime;
            let curFormatted = formatTime(cur);
            if (dur >= 3600 && cur < 3600) { curFormatted = `00:${Math.floor((cur % 3600) / 60).toString().padStart(2, '0')}:${Math.floor(cur % 60).toString().padStart(2, '0')}`; }
            timeDisplay.textContent = `${curFormatted} / ${formatTime(dur)}`;
        }

        video.addEventListener('waiting', () => loading.classList.add('active'));
        video.addEventListener('playing', () => loading.classList.remove('active'));
        video.addEventListener('canplay', () => loading.classList.remove('active'));

        function resetControlsTimeoutOnAction() {
            playerWrapper.classList.add('show-controls'); clearTimeout(hideControlsTimeout);
            if (!video.paused) { hideControlsTimeout = setTimeout(() => { playerWrapper.classList.remove('show-controls'); settingsMenu.classList.remove('show'); }, 5000); }
        }
    </script>
</body>
</html>
