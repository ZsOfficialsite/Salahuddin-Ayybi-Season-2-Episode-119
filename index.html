<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ZS Official Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #030617 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            user-select: none;
        }

        /* --- CLOUDFLARE SECURITY OVERLAY --- */
        .security-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        .security-box {
            background: #18181b; 
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lock-icon {
            background: #1e293b;
            width: 72px; height: 72px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }

        .lock-icon svg {
            width: 32px; height: 32px;
            stroke: #3b82f6; 
            fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }

        .security-box h2 {
            font-size: 24px; font-weight: 600; margin-bottom: 12px; color: #f4f4f5; letter-spacing: -0.5px;
        }

        .security-box p {
            font-size: 15px; color: #a1a1aa; margin-bottom: 30px; line-height: 1.5;
        }

        /* --- MAIN CONTAINER --- */
        .container {
            width: 95%;
            max-width: 1100px;
            position: relative;
            z-index: 10;
            display: none; 
        }

        /* Player Wrapper */
        .player-wrapper {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #000; /* BLACK BACKGROUND FOR BARS */
            border: 2px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), inset 0 0 15px rgba(212, 175, 55, 0.1);
            cursor: pointer;
            transition: border-color 0.3s ease;
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        /* YouTube Style Title Section */
        .video-info-section {
            margin-top: 15px;
            padding: 0 5px;
            width: 100%;
        }

        .video-main-title {
            color: #D4AF37;
            font-family: 'Inter', sans-serif;
            font-size: clamp(18px, 4.5vw, 24px);
            font-weight: 700;
            line-height: 1.3;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
        }

        .player-wrapper.is-fullscreen,
        .player-wrapper:fullscreen,
        .player-wrapper:-webkit-full-screen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            max-width: none !important;
            border-radius: 0 !important;
            border: none !important;
            z-index: 9999 !important;
            padding: 0 !important;
            margin: 0 !important;
            overflow: visible !important;
            background: #000 !important;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            background: #000;
            object-fit: contain; /* FIXED: VIDEO STAYS INSIDE FRAME */
            pointer-events: none; 
        }

        .player-wrapper.is-fullscreen video {
            width: 100% !important;
            height: 100% !important;
            aspect-ratio: auto !important;
            object-fit: contain !important;
        }

        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.8) 50%, transparent 100%);
            padding: 30px max(25px, env(safe-area-inset-right)) 20px max(25px, env(safe-area-inset-left));
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            opacity: 0;
            z-index: 101;
        }

        .player-wrapper.show-controls .controls {
            transform: translateY(0);
            opacity: 1;
        }

        /* --- BUTTONS & TIMELINE --- */
        .progress-container {
            width: 100%; height: 7px; background: rgba(255, 255, 255, 0.1); 
            border-radius: 10px; margin-bottom: 20px; cursor: pointer;
            position: relative; transition: height 0.2s ease; pointer-events: auto; 
        }

        .progress-container:hover { height: 9px; }

        .progress-bar {
            height: 100%; background: linear-gradient(90deg, #D4AF37 0%, #f1c40f 100%);
            border-radius: 10px; width: 0%; position: relative;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.7); z-index: 2;
        }

        .controls-row { display: flex; align-items: center; gap: 18px; pointer-events: auto; }

        .btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px; width: 45px; height: 45px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.3s ease; color: rgba(212, 175, 55, 0.9);
            font-size: 18px; backdrop-filter: blur(10px);
        }

        .time-display { color: rgba(212, 175, 55, 0.9); font-size: 14px; min-width: 110px; }

        /* --- LOADING & EFFECTS --- */
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 50; }
        .loading.active { display: block; }
        .spinner { width: 65px; height: 65px; border: 5px solid rgba(212, 175, 55, 0.1); border-top: 5px solid #D4AF37; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .pause-ring-effect { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); width: 150px; height: 150px; display: flex; align-items: center; justify-content: center; opacity: 0; z-index: 100; pointer-events: none; }
        .pause-ring-effect.active { opacity: 1; transform: translate(-50%, -50%) scale(1); transition: all 0.4s ease; }

        .dt-indicator { position: absolute; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; color: #D4AF37; background: rgba(0, 0, 0, 0.6); border-radius: 50%; width: 80px; height: 80px; opacity: 0; z-index: 120; pointer-events: none; }
        .dt-indicator.active { animation: dtPop 0.5s ease-out forwards; }
        @keyframes dtPop { 0% { transform: translateY(-50%) scale(0.8); opacity: 1; } 100% { transform: translateY(-50%) scale(1.3); opacity: 0; } }

        /* TOP RIGHT MENU */
        .top-right-container { position: absolute; top: 20px; right: 20px; z-index: 150; opacity: 0; transition: opacity 0.4s ease; }
        .player-wrapper.show-controls .top-right-container { opacity: 1; pointer-events: auto; }
        .settings-menu { position: absolute; top: 55px; right: 0; background: rgba(15, 15, 20, 0.95); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; display: none; flex-direction: column; min-width: 180px; backdrop-filter: blur(15px); }
        .settings-menu.show { display: flex; }
        .menu-item { background: none; border: none; color: #e4e4e7; padding: 12px 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; }

        @media (max-width: 480px) { .controls { padding: 15px 12px 10px 12px; } .btn { width: 34px; height: 34px; } }
    </style>
</head>
<body>

    <div id="securityOverlay" class="security-overlay">
        <div class="security-box">
            <div class="lock-icon"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2" ry="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg></div>
            <h2>Security Check</h2>
            <p>Verify you are human to access this secure content.</p>
            <div class="cf-turnstile" data-sitekey="0x4AAAAAACxoimIN2VZKXQHA" data-theme="dark" data-callback="onCloudflareVerified"></div>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <div class="player-wrapper show-controls" id="playerWrapper">
            
            <div class="top-right-container">
                <button class="btn" id="settingsBtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg></button>
                <div class="settings-menu" id="settingsMenu">
                    <button class="menu-item" id="speedBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>Speed</button>
                    <button class="menu-item" id="downloadBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>Download</button>
                </div>
            </div>

            <div class="download-modal" id="speedModal">
                <div class="modal-content">
                    <button class="modal-close" id="closeSpeedModalBtn">&times;</button>
                    <h3 class="modal-title">Playback Speed</h3>
                    <a href="#" class="modal-link speed-option" data-speed="0.5">0.5x</a>
                    <a href="#" class="modal-link speed-option" data-speed="1">Normal (1x)</a>
                    <a href="#" class="modal-link speed-option" data-speed="1.5">1.5x</a>
                    <a href="#" class="modal-link speed-option" data-speed="2">2x</a>
                </div>
            </div>

            <div class="download-modal" id="downloadModal">
                <div class="modal-content">
                    <button class="modal-close" id="closeModalBtn">&times;</button>
                    <div style="padding: 20px 10px; color: #D4AF37;">Coming Soon...</div>
                </div>
            </div>

            <div class="loading"><div class="spinner"></div></div>
            <div class="dt-indicator left" id="dtLeft"><svg viewBox="0 0 24 24"><polygon points="11,19 2,12 11,5"></polygon><polygon points="22,19 13,12 22,5"></polygon></svg><span>5s</span></div>
            <div class="dt-indicator right" id="dtRight"><svg viewBox="0 0 24 24"><polygon points="13,19 22,12 13,5"></polygon><polygon points="2,19 11,12 2,5"></polygon></svg><span>5s</span></div>
            <div class="pause-ring-effect" id="pauseEffect"><svg viewBox="0 0 100 100"><rect x="36" y="32" width="10" height="36" rx="2" fill="#D4AF37"/><rect x="54" y="32" width="10" height="36" rx="2" fill="#D4AF37"/><circle cx="50" cy="50" r="46" fill="none" stroke="#D4AF37" stroke-width="3"/></svg></div>

            <video id="video" playsinline preload="auto" poster="https://files.catbox.moe/v33t1o.jpg"></video>

            <div class="controls" id="controls">
                <div class="progress-container" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>
                <div class="controls-row">
                    <button class="btn" id="rewindBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg></button>
                    <button class="btn" id="playBtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                    <button class="btn" id="forwardBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg></button>
                    <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
                    <div style="flex:1"></div>
                    <button class="btn" id="muteBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg></button>
                    <button class="btn" id="fullscreenBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg></button>
                </div>
            </div>
        </div>

        <div class="video-info-section">
            <h1 class="video-main-title">Salahuddin Ayyubi Season 2 Episode 119</h1>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const playerWrapper = document.getElementById('playerWrapper');
        const videoSource = "https://binding-brena-saood-432b4631.koyeb.app/stream/16?hash=9063c6";

        function onCloudflareVerified() {
            document.getElementById('securityOverlay').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
        }

        // --- FULL SCREEN & AUTO ROTATE FIX ---
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                playerWrapper.requestFullscreen().then(() => {
                    // FIXED: AUTO ROTATE TO LANDSCAPE ON ANDROID
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(() => {});
                    }
                }).catch(() => {});
            } else {
                document.exitFullscreen();
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            }
        }

        // --- VIDEO INIT ---
        if (Hls.isSupported()) {
            const hls = new Hls(); hls.loadSource(videoSource); hls.attachMedia(video);
        } else { video.src = videoSource; }

        // --- UI LOGIC ---
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');

        playBtn.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                playBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"></rect><rect x="14" y="4" width="4" height="16" rx="1"></rect></svg>';
            } else {
                video.pause();
                playBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
            }
        });

        video.addEventListener('timeupdate', () => {
            const progress = (video.currentTime / video.duration) * 100;
            progressBar.style.width = progress + '%';
            timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
        });

        function formatTime(s) {
            const m = Math.floor(s / 60); const sec = Math.floor(s % 60);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
        document.getElementById('settingsBtn').addEventListener('click', () => document.getElementById('settingsMenu').classList.toggle('show'));
        document.querySelectorAll('.speed-option').forEach(opt => opt.addEventListener('click', (e) => {
            video.playbackRate = parseFloat(e.target.dataset.speed);
            document.getElementById('speedModal').classList.remove('show');
        }));
        
        // --- BUTTON HANDLERS ---
        document.getElementById('speedBtn').addEventListener('click', () => { document.getElementById('speedModal').classList.add('show'); document.getElementById('settingsMenu').classList.remove('show'); });
        document.getElementById('downloadBtn').addEventListener('click', () => { document.getElementById('downloadModal').classList.add('show'); document.getElementById('settingsMenu').classList.remove('show'); });
        document.querySelectorAll('.modal-close').forEach(c => c.addEventListener('click', () => document.querySelectorAll('.download-modal').forEach(m => m.classList.remove('show'))));
        document.getElementById('rewindBtn').addEventListener('click', () => video.currentTime -= 5);
        document.getElementById('forwardBtn').addEventListener('click', () => video.currentTime += 5);
    </script>
</body>
</html>
