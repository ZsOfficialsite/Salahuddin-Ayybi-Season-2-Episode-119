<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ZS Official Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #030617 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            user-select: none;
        }

        /* --- CLOUDFLARE OVERLAY --- */
        .security-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        
        .security-box {
            background: #18181b; border: 1px solid #27272a; border-radius: 12px;
            padding: 40px 30px; text-align: center; max-width: 420px; width: 90%; color: #fff;
        }

        /* --- MAIN CONTAINER --- */
        .container { width: 95%; max-width: 1100px; position: relative; z-index: 10; display: none; }

        .player-wrapper {
            position: relative; border-radius: 24px; overflow: hidden; background: #000;
            border: 2px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            cursor: pointer; outline: none;
        }

        /* FIXED: VIDEO FRAME & CONTAIN */
        video {
            width: 100%; height: 100%; display: block; aspect-ratio: 16 / 9;
            background: #000; object-fit: contain; pointer-events: none; 
        }

        .player-wrapper.is-fullscreen video { object-fit: contain !important; }

        /* --- YOUTUBE STYLE TITLE --- */
        .video-info-section { margin-top: 15px; padding: 0 5px; width: 100%; }
        .video-main-title {
            color: #D4AF37; font-size: clamp(18px, 4.5vw, 24px); font-weight: 700;
            line-height: 1.3; text-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
        }

        /* --- MODALS FIXED (Poochha tha na 'ya kr diya') --- */
        .download-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            z-index: 999999; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .download-modal.show { display: flex; opacity: 1; }

        .modal-content {
            background: #101017; border: 2px solid #D4AF37; border-radius: 16px;
            padding: 30px; width: 90%; max-width: 350px; text-align: center;
            position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }

        .modal-title { color: #D4AF37; font-size: 18px; margin-bottom: 20px; font-weight: 700; text-transform: uppercase; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #ccc; font-size: 24px; cursor: pointer; }
        
        .modal-link {
            display: block; padding: 12px; margin: 8px 0; background: rgba(212, 175, 55, 0.1);
            color: #fff; text-decoration: none; border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.3);
            font-weight: 500; transition: 0.3s;
        }
        .modal-link:hover { background: #D4AF37; color: #000; }

        /* --- CONTROLS --- */
        .controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, transparent 100%);
            padding: 20px; opacity: 0; transition: 0.4s; z-index: 101;
        }
        .player-wrapper.show-controls .controls { opacity: 1; }

        .progress-container { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.2); border-radius: 10px; margin-bottom: 15px; cursor: pointer; }
        .progress-bar { height: 100%; background: #D4AF37; width: 0%; border-radius: 10px; box-shadow: 0 0 10px #D4AF37; }
        
        .controls-row { display: flex; align-items: center; gap: 15px; }
        .btn { background: none; border: none; cursor: pointer; color: #D4AF37; transition: 0.3s; }
        .btn:hover { transform: scale(1.1); color: #fff; }

        .time-display { color: #D4AF37; font-size: 13px; font-weight: 500; min-width: 100px; }

        /* MENU */
        .top-right-container { position: absolute; top: 20px; right: 20px; z-index: 150; opacity: 0; transition: 0.4s; }
        .player-wrapper.show-controls .top-right-container { opacity: 1; }
        .settings-menu { position: absolute; top: 50px; right: 0; background: #101017; border: 1px solid #D4AF37; border-radius: 8px; display: none; flex-direction: column; min-width: 150px; }
        .settings-menu.show { display: flex; }
        .menu-item { background: none; border: none; color: #fff; padding: 12px; text-align: left; cursor: pointer; }
        .menu-item:hover { background: rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body>

    <div id="securityOverlay" class="security-overlay">
        <div class="security-box">
            <h2>Security Check</h2>
            <p>Verify you are human to access this secure content.</p>
            <div class="cf-turnstile" data-sitekey="0x4AAAAAACxoimIN2VZKXQHA" data-theme="dark" data-callback="onCloudflareVerified"></div>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <div class="player-wrapper show-controls" id="playerWrapper">
            
            <div class="top-right-container">
                <button class="btn" id="settingsBtn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg></button>
                <div class="settings-menu" id="settingsMenu">
                    <button class="menu-item" id="speedBtn">⚡ Speed</button>
                    <button class="menu-item" id="downloadBtn">📥 Download</button>
                </div>
            </div>

            <div class="download-modal" id="speedModal">
                <div class="modal-content">
                    <button class="modal-close" id="closeSpeedModalBtn">&times;</button>
                    <h3 class="modal-title">Playback Speed</h3>
                    <a href="#" class="modal-link speed-option" data-speed="0.5">0.5x</a>
                    <a href="#" class="modal-link speed-option" data-speed="1">Normal (1x)</a>
                    <a href="#" class="modal-link speed-option" data-speed="1.5">1.5x</a>
                    <a href="#" class="modal-link speed-option" data-speed="2">2x</a>
                </div>
            </div>

            <div class="download-modal" id="downloadModal">
                <div class="modal-content">
                    <button class="modal-close" id="closeModalBtn">&times;</button>
                    <h3 class="modal-title">Download</h3>
                    <div style="padding: 10px; color: #D4AF37;">Coming Soon...</div>
                </div>
            </div>

            <video id="video" playsinline preload="auto" poster="https://files.catbox.moe/v33t1o.jpg"></video>

            <div class="controls">
                <div class="progress-container" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>
                <div class="controls-row">
                    <button class="btn" id="rewindBtn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg></button>
                    <button class="btn" id="playBtn"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                    <button class="btn" id="forwardBtn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg></button>
                    <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
                    <div style="flex:1"></div>
                    <button class="btn" id="fullscreenBtn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg></button>
                </div>
            </div>
        </div>

        <div class="video-info-section">
            <h1 class="video-main-title">Salahuddin Ayyubi Season 2 Episode 119</h1>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const playerWrapper = document.getElementById('playerWrapper');
        const videoSource = "https://binding-brena-saood-432b4631.koyeb.app/stream/16?hash=9063c6";

        function onCloudflareVerified() {
            document.getElementById('securityOverlay').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
        }

        // --- FIXED FULL SCREEN & ROTATE ---
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                playerWrapper.requestFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(() => {});
                    }
                }).catch(() => {});
            } else { document.exitFullscreen(); }
        }

        if (Hls.isSupported()) {
            const hls = new Hls(); hls.loadSource(videoSource); hls.attachMedia(video);
        } else { video.src = videoSource; }

        // UI Handlers
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');

        playBtn.addEventListener('click', () => {
            if (video.paused) { video.play(); playBtn.innerHTML = 'PAUSE'; }
            else { video.pause(); playBtn.innerHTML = 'PLAY'; }
        });

        video.addEventListener('timeupdate', () => {
            const progress = (video.currentTime / video.duration) * 100;
            progressBar.style.width = progress + '%';
            timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
        });

        function formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; }

        document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
        document.getElementById('settingsBtn').addEventListener('click', () => document.getElementById('settingsMenu').classList.toggle('show'));
        document.getElementById('speedBtn').addEventListener('click', () => { document.getElementById('speedModal').classList.add('show'); document.getElementById('settingsMenu').classList.remove('show'); });
        document.getElementById('downloadBtn').addEventListener('click', () => { document.getElementById('downloadModal').classList.add('show'); document.getElementById('settingsMenu').classList.remove('show'); });
        document.querySelectorAll('.modal-close').forEach(c => c.addEventListener('click', () => document.querySelectorAll('.download-modal').forEach(m => m.classList.remove('show'))));
        document.querySelectorAll('.speed-option').forEach(o => o.addEventListener('click', (e) => { video.playbackRate = parseFloat(e.target.dataset.speed); document.getElementById('speedModal').classList.remove('show'); }));
        document.getElementById('rewindBtn').addEventListener('click', () => video.currentTime -= 10);
        document.getElementById('forwardBtn').addEventListener('click', () => video.currentTime += 10);
    </script>
</body>
</html>
