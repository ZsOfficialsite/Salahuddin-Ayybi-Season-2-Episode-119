    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #030617 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            user-select: none;
        }

        /* --- CLOUDFLARE SECURITY OVERLAY --- */
        .security-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        .security-box {
            background: #18181b; 
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lock-icon {
            background: #1e293b;
            width: 72px; height: 72px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }

        .lock-icon svg {
            width: 32px; height: 32px;
            stroke: #3b82f6; 
            fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }

        .security-box h2 {
            font-size: 24px; font-weight: 600; margin-bottom: 12px; color: #f4f4f5; letter-spacing: -0.5px;
        }

        .security-box p {
            font-size: 15px; color: #a1a1aa; margin-bottom: 30px; line-height: 1.5;
        }

        /* --- MAIN CONTAINER --- */
        .container {
            width: 95%;
            max-width: 1100px;
            position: relative;
            z-index: 10;
            display: none; 
        }

        /* Player Wrapper */
        .player-wrapper {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            border: 2px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), inset 0 0 15px rgba(212, 175, 55, 0.1);
            cursor: pointer;
            transition: border-color 0.3s ease;
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        /* YouTube Style Title Section */
        .video-info-section {
            margin-top: 15px;
            padding: 0 5px;
            width: 100%;
        }

        .video-main-title {
            color: #D4AF37;
            font-family: 'Inter', sans-serif; /* Changed to Inter for Normal Case look */
            font-size: clamp(18px, 4.5vw, 24px);
            font-weight: 700; /* Bold */
            line-height: 1.3;
            /* Golden Neon Effect */
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
            letter-spacing: -0.2px;
        }

        .player-wrapper.is-fullscreen,
        .player-wrapper:fullscreen,
        .player-wrapper:-webkit-full-screen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            max-width: none !important;
            border-radius: 0 !important;
            border: none !important;
            z-index: 9999 !important;
            padding: 0 !important;
            margin: 0 !important;
            overflow: visible !important;
            background: #000 !important;
        }

        .video-logo {
            display: none !important;
        }

        .top-right-container {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: max(20px, env(safe-area-inset-right));
            z-index: 150;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .player-wrapper.show-controls .top-right-container {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-menu {
            position: absolute;
            top: 55px; 
            right: 0;
            background: rgba(15, 15, 20, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 8px 0;
            display: none; 
            flex-direction: column;
            min-width: 180px;
            backdrop-filter: blur(15px);
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.7);
            transform: translateY(-10px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .settings-menu.show {
            display: flex;
            transform: translateY(0);
            opacity: 1;
        }

        .menu-item {
            background: none;
            border: none;
            color: #e4e4e7;
            padding: 12px 20px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            transition: background 0.2s ease, color 0.2s ease;
            outline: none;
            width: 100%;
        }

        .menu-item:hover {
            background: rgba(212, 175, 55, 0.15);
            color: #D4AF37;
        }

        .download-modal {
            position: fixed; 
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 999999;
            display: none; 
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .download-modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: rgba(10, 10, 15, 0.98);
            border: 2px solid rgba(212, 175, 55, 0.4);
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 300px;
            text-align: center;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            overflow: hidden; 
        }

        .download-modal.show .modal-content {
            transform: scale(1);
        }

        .modal-title {
            color: #D4AF37;
            font-size: 18px;
            margin-bottom: 15px;
            font-family: 'Inter', sans-serif; 
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: #ccc;
            font-size: 26px;
            cursor: pointer;
        }

        .modal-link {
            display: block;
            padding: 10px;
            margin: 6px 0;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: 0.2s;
        }

        .modal-link:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: #D4AF37;
            color: #D4AF37;
        }

        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            background: #000;
            object-fit: cover; 
            pointer-events: none; 
        }

        .player-wrapper.is-fullscreen video {
            width: 100% !important;
            height: 100% !important;
            aspect-ratio: auto !important;
            object-fit: contain !important;
        }

        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.8) 50%, transparent 100%);
            padding: 30px max(25px, env(safe-area-inset-right)) 20px max(25px, env(safe-area-inset-left));
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            opacity: 0;
            z-index: 101;
        }

        .player-wrapper.show-controls .controls {
            transform: translateY(0);
            opacity: 1;
        }

        .progress-container {
            width: 100%;
            height: 7px;
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 10px;
            margin-bottom: 20px;
            cursor: pointer;
            position: relative;
            transition: height 0.2s ease;
            pointer-events: auto; 
        }

        .progress-container:hover {
            height: 9px;
            background: rgba(255, 255, 255, 0.15);
        }

        .seek-preview-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.4); 
            border-radius: 10px;
            width: 0%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease; 
            z-index: 1;
        }
        
        .seek-preview-bar.active {
            opacity: 1; 
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #D4AF37 0%, #f1c40f 100%);
            border-radius: 10px;
            width: 0%;
            position: relative;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.7);
            z-index: 2;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 18px;
            pointer-events: auto; 
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(212, 175, 55, 0.9);
            font-size: 18px;
            backdrop-filter: blur(10px);
            text-decoration: none; 
        }

        .btn:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.5);
            transform: scale(1.08);
            color: #fff;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .time-display {
            color: rgba(212, 175, 55, 0.9);
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
            min-width: 110px;
        }

        .spacer {
            flex: 1;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 50;
            pointer-events: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 65px;
            height: 65px;
            border: 5px solid rgba(212, 175, 55, 0.1);
            border-top: 5px solid #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .pause-ring-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 100;
        }

        .pause-ring-effect.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .pause-ring-effect svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: #D4AF37;
            stroke-width: 3;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 1));
        }

        .dt-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #D4AF37;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            width: 80px;
            height: 80px;
            opacity: 0;
            pointer-events: none;
            z-index: 120;
        }
        .dt-indicator.left { left: 15%; }
        .dt-indicator.right { right: 15%; }
        .dt-indicator svg { width: 30px; height: 30px; fill: currentColor; }
        .dt-indicator span { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: bold; margin-top: 2px; }
        
        .dt-indicator.active {
            animation: dtPop 0.5s ease-out forwards;
        }
        @keyframes dtPop {
            0% { transform: translateY(-50%) scale(0.8); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-50%) scale(1.3); opacity: 0; }
        }

        @media (max-width: 1100px) {
            .controls { padding: 20px max(15px, env(safe-area-inset-right)) 15px max(15px, env(safe-area-inset-left)); }
            .controls-row { gap: 6px; }
            .btn { width: 36px; height: 36px; border-radius: 8px; }
            .btn svg { width: 17px; height: 17px; }
            .time-display { font-size: 11px; min-width: auto; white-space: nowrap; }
            .pause-ring-effect { width: 80px; height: 80px; }
            .dt-indicator { width: 70px; height: 70px; }
            .dt-indicator svg { width: 25px; height: 25px; }
            .dt-indicator span { font-size: 11px; }
        }

        @media (max-width: 480px) {
            .controls { padding: 15px 12px 10px 12px; }

            .btn { width: 34px; height: 34px; border-radius: 8px; }

            .settings-menu { top: 45px; min-width: 140px; }
            .menu-item { font-size: 13px; padding: 10px 15px; }
        }
    </style>
</head>

        downloadBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsMenu.classList.remove('show'); 
            downloadModal.classList.add('show'); 
            resetControlsTimeoutOnAction();
        });

        speedBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsMenu.classList.remove('show'); 
            speedModal.classList.add('show'); 
            resetControlsTimeoutOnAction();
        });

        closeModalBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            downloadModal.classList.remove('show');
        });

        downloadModal.addEventListener('click', (e) => {
            if (e.target === downloadModal) {
                downloadModal.classList.remove('show');
            }
        });

        closeSpeedModalBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            speedModal.classList.remove('show');
        });

        speedModal.addEventListener('click', (e) => {
            if (e.target === speedModal) {
                speedModal.classList.remove('show');
            }
        });

        speedOptions.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                video.playbackRate = parseFloat(link.getAttribute('data-speed'));
                speedModal.classList.remove('show');
            });
        });

        document.addEventListener('contextmenu', (e) => {
            e.preventDefault(); 
        });

        // FIXED HLS AND DIRECT PLAYBACK LOGIC
        if (videoSource.includes('.m3u8')) {
            if (Hls.isSupported()) {
                const hls = new Hls({ maxMaxBufferLength: 60 });
                hls.loadSource(videoSource);
                hls.attachMedia(video);
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) loading.classList.add('active');
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoSource;
            }
        } else {
            video.src = videoSource;
        }

        video.addEventListener('play', () => {
            playerWrapper.classList.add('has-started');
        });

        function fastSeekOptimized(amount) {
            video.currentTime += amount;
        }

        function triggerIndicator(element) {
            element.classList.remove('active');
            void element.offsetWidth;
            element.classList.add('active');
            resetControlsTimeoutOnAction();
        }

        function togglePlay() {
            if (video.paused) {
                video.play().then(() => {
                    playBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"></rect><rect x="14" y="4" width="4" height="16" rx="1"></rect></svg>';
                    pauseEffect.classList.remove('active');
                    showControls();
                }).catch(e => console.log("Play failed"));
            } else {
                video.pause();
                playBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
                pauseEffect.classList.add('active');
                showControls();
            }
        }

        function showControls() {
            playerWrapper.classList.add('show-controls');
            clearTimeout(hideControlsTimeout);
            if (!video.paused) {
                hideControlsTimeout = setTimeout(() => {
                    playerWrapper.classList.remove('show-controls');
                    settingsMenu.classList.remove('show');
                }, 5000);
            }
        }

        if (!isTouchDevice) {
            playerWrapper.addEventListener('mousemove', showControls);
            playerWrapper.addEventListener('mouseenter', showControls);
        }

        playBtn.addEventListener('click', togglePlay);

        let isDraggingTimeline = false;
        function getTimelinePos(e) {
            const rect = progressContainer.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
            let pos = (clientX - rect.left) / rect.width;
            return Math.max(0, Math.min(pos, 1));
        }

        if (!isTouchDevice) {
            progressContainer.addEventListener('mousemove', (e) => {
                if (!isDraggingTimeline) {
                    seekPreviewBar.style.width = (getTimelinePos(e) * 100) + '%';
                    seekPreviewBar.classList.add('active');
                }
            });
            progressContainer.addEventListener('mouseleave', () => {
                if (!isDraggingTimeline) seekPreviewBar.classList.remove('active');
            });
        }

        function startDrag(e) {
            isDraggingTimeline = true;
            seekPreviewBar.classList.add('active'); 
            updateDrag(e);
            document.addEventListener('mousemove', updateDrag);
            document.addEventListener('touchmove', updateDrag, { passive: false });
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);
        }

        function updateDrag(e) {
            if (!isDraggingTimeline) return;
            if (e.type === 'touchmove') e.preventDefault(); 
            const pos = getTimelinePos(e);
            seekPreviewBar.style.width = (pos * 100) + '%';
            progressBar.style.width = (pos * 100) + '%'; 
            const customTime = pos * video.duration;
            timeDisplay.textContent = `${formatTime(customTime)} / ${formatTime(video.duration)}`;
        }

        function endDrag(e) {
            if (!isDraggingTimeline) return;
            isDraggingTimeline = false;
            video.currentTime = getTimelinePos(e) * video.duration; 
            seekPreviewBar.classList.remove('active'); 
            document.removeEventListener('mousemove', updateDrag);
            document.removeEventListener('touchmove', updateDrag);
            document.removeEventListener('mouseup', endDrag);
            document.removeEventListener('touchend', endDrag);
            resetControlsTimeoutOnAction();
        }

        progressContainer.addEventListener('mousedown', startDrag);
        progressContainer.addEventListener('touchstart', startDrag, { passive: false });

        video.addEventListener('timeupdate', () => {
            if(!video.seeking && !isDraggingTimeline) { 
                progressBar.style.width = (video.currentTime / video.duration) * 100 + '%';
                updateTimeDisplay();
            }
        });

        playerWrapper.addEventListener('click', (e) => {
            if(!e.target.closest('.top-right-container')) settingsMenu.classList.remove('show');
            if(e.target.closest('.controls') || e.target.closest('.progress-container')) return;
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;
            const rect = playerWrapper.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            let region = clickX < rect.width / 3 ? 'left' : (clickX > (rect.width * 2) / 3 ? 'right' : 'center');
            
            if (!isTouchDevice) {
                if (tapLength < 300 && tapLength > 0) { toggleFullscreen(); lastTapTime = 0; } else { togglePlay(); lastTapTime = currentTime; }
                return;
            }
            if (tapLength < 300 && tapLength > 0) {
                if (region === 'left') { fastSeekOptimized(-5); triggerIndicator(dtLeft); } 
                else if (region === 'right') { fastSeekOptimized(5); triggerIndicator(dtRight); } 
                else togglePlay();
                lastTapTime = 0; 
            } else {
                if (region === 'center') togglePlay(); else showControls();
                lastTapTime = currentTime;
            }
        });

        rewindBtn.addEventListener('click', (e) => { e.stopPropagation(); fastSeekOptimized(-5); triggerIndicator(dtLeft); resetControlsTimeoutOnAction(); });
        forwardBtn.addEventListener('click', (e) => { e.stopPropagation(); fastSeekOptimized(5); triggerIndicator(dtRight); resetControlsTimeoutOnAction(); });

        function toggleFullscreen() {
            if (!document.fullscreenElement) playerWrapper.requestFullscreen().catch(() => {}); else document.exitFullscreen();
        }
        fullscreenBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFullscreen(); });

        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation(); video.muted = !video.muted;
            muteBtn.innerHTML = video.muted ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2V15H6L11 19V5Z"></path><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>' : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>';
            resetControlsTimeoutOnAction();
        });

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return '00:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return h > 0 ? `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}` : `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateTimeDisplay() {
            timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (mainContainer.style.display !== 'block') return;
            if (key === 'k' || key === ' ' || e.code === 'Space') { e.preventDefault(); togglePlay(); }
            else if (key === 'arrowleft' || e.code === 'ArrowLeft') { fastSeekOptimized(-5); triggerIndicator(dtLeft); }
            else if (key === 'arrowright' || e.code === 'ArrowRight') { fastSeekOptimized(5); triggerIndicator(dtRight); }
            else if (key === 'f' || e.code === 'KeyF') toggleFullscreen();
            else if (key === 'm' || e.code === 'KeyM') muteBtn.click(); 
        });

        video.addEventListener('waiting', () => loading.classList.add('active'));
        video.addEventListener('playing', () => loading.classList.remove('active'));
        video.addEventListener('canplay', () => loading.classList.remove('active'));

        function resetControlsTimeoutOnAction() {
            playerWrapper.classList.add('show-controls');
            clearTimeout(hideControlsTimeout);
            if (!video.paused) hideControlsTimeout = setTimeout(() => { playerWrapper.classList.remove('show-controls'); settingsMenu.classList.remove('show'); }, 5000);
        }
    </script>
</body>
</html>
